model:
  variant: rtdetr-m.pt
  pretrained: true 

dataset:
  config: configs/dataset.yaml

training:
  epochs: 100
  batch: 16
  imgsz: 640
  optimizer: AdamW
  lr0: 0.0001 
  lrf: 0.01
  weight_decay: 0.0001
  warmup_epochs: 5
  cos_lr: true

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  flipud: 0.0
  fliplr: 0.5
  mosaic: 0.0
  mixup: 0.0

output:
  project: checkpoints/rtdetr
  name: run
  save_period: 10
  plots: true
