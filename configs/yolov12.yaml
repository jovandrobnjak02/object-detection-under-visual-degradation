# YOLOv12 training configuration
# Uses the Ultralytics API: model = YOLO("yolo12m.pt")
# YOLOv12 adds area-based attention to the CNN backbone.

model:
  variant: yolo12m.pt          # Medium variant
  pretrained: true

dataset:
  config: configs/dataset.yaml

training:
  epochs: 100
  batch: 16
  imgsz: 640
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  cos_lr: true

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0

output:
  project: checkpoints/yolov12
  name: run
  save_period: 10
  plots: true
