model:
  variant: rfdetr_medium
  backbone: dinov2             
  pretrained: true

dataset:
  config: /content/data_prepared/coco
  format: coco

training:
  epochs: 100
  batch_size: 16
  imgsz: 576
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation: 1
  checkpoint_interval: 10

output:
  checkpoint_dir: checkpoints/rfdetr
